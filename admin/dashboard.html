<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Gadgets360.np Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="dashboard-body">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" target="_blank" class="admin-logo">
        <span class="logo-g">G</span>360<span class="logo-np">.np</span>
      </a>
      <span class="admin-badge">Admin</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="#" class="nav-item" data-page="products">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Products
      </a>
      <a href="#" class="nav-item" data-page="orders">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        Orders
        <span class="nav-badge" id="ordersBadge">0</span>
      </a>
      <a href="#" class="nav-item" data-page="inquiries">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Inquiries
        <span class="nav-badge" id="inquiriesBadge">0</span>
      </a>
      <a href="#" class="nav-item" data-page="deals">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        Deals & Banners
      </a>
      <a href="#" class="nav-item" data-page="settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="../index.html" target="_blank" class="sidebar-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        View Site
      </a>
      <button class="sidebar-link" id="logoutBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-wrap">
    <!-- TOP BAR -->
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <div class="topbar-right">
        <span class="topbar-user">👤 Admin</span>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="content" id="pageContent">
      <!-- Rendered by JS -->
    </main>
  </div>

  <!-- PRODUCT MODAL -->
  <div class="modal-overlay" id="productModal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Product</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form class="modal-form" id="productForm">
        <input type="hidden" id="productId" />
        <div class="form-row">
          <div class="form-group">
            <label>Product Name *</label>
            <input type="text" id="pName" placeholder="iPhone 16 Pro Max" required />
          </div>
          <div class="form-group">
            <label>Brand *</label>
            <input type="text" id="pBrand" placeholder="Apple" required />
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="pDesc" rows="2" placeholder="Key specs or description..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Price (NPR) *</label>
            <input type="number" id="pPrice" placeholder="85000" required />
          </div>
          <div class="form-group">
            <label>Old Price (NPR)</label>
            <input type="number" id="pOldPrice" placeholder="90000 (optional)" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Category</label>
            <select id="pCategory">
              <option value="smartphones">📱 Smartphones</option>
              <option value="laptops">💻 Laptops</option>
              <option value="audio">🎧 Audio</option>
              <option value="smartwatches">⌚ Smartwatches</option>
              <option value="cameras">📸 Cameras</option>
              <option value="gaming">🎮 Gaming</option>
              <option value="accessories">🔌 Accessories</option>
              <option value="networking">📡 Networking</option>
            </select>
          </div>
          <div class="form-group">
            <label>Badge</label>
            <select id="pBadge">
              <option value="">None</option>
              <option value="new">New</option>
              <option value="hot">Hot</option>
              <option value="sale">Sale</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Status</label>
            <select id="pStatus">
              <option value="active">Active (visible on site)</option>
              <option value="hidden">Hidden</option>
              <option value="outofstock">Out of Stock</option>
            </select>
          </div>
          <div class="form-group">
            <label>Featured?</label>
            <select id="pFeatured">
              <option value="yes">Yes — show on homepage</option>
              <option value="no">No</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="modalCancel">Cancel</button>
          <button type="submit" class="btn-save">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ORDER STATUS MODAL -->
  <div class="modal-overlay" id="orderModal" hidden>
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Update Order</h3>
        <button class="modal-close" id="orderModalClose">&times;</button>
      </div>
      <div class="modal-form">
        <input type="hidden" id="editOrderId" />
        <div class="form-group">
          <label>Customer Name</label>
          <input type="text" id="editOrderName" readonly />
        </div>
        <div class="form-group">
          <label>Product</label>
          <input type="text" id="editOrderProduct" readonly />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="editOrderStatus">
            <option value="new">New</option>
            <option value="contacted">Contacted</option>
            <option value="confirmed">Confirmed</option>
            <option value="shipped">Shipped</option>
            <option value="delivered">Delivered</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="editOrderNotes" rows="3" placeholder="Internal notes..."></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="orderModalCancel">Cancel</button>
          <button type="button" class="btn-save" id="saveOrderBtn">Update Order</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast-wrap" id="toastWrap"></div>

  <script src="js/data.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
